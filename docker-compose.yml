version: "3.8"

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: commerce-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - commerce-network

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: commerce-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # PLAINTEXT_HOST: 로컬 애플리케이션에서 접근하는 리스너
      # PLAINTEXT: 컨테이너 내부(kafka-ui 등)에서 접근하는 리스너
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - commerce-network

  mysql:
    image: mysql:8.0
    container_name: commerce-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root1234
      MYSQL_USER: commerce
      MYSQL_PASSWORD: commerce1234
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./scripts/mysql-init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - commerce-network

  redis:
    image: redis:7.2-alpine
    container_name: commerce-redis
    ports:
      - "6379:6379"
    networks:
      - commerce-network

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: commerce-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8989:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    networks:
      - commerce-network

networks:
  commerce-network:
    driver: bridge

volumes:
  mysql-data:
