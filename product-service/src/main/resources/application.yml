server:
  port: 8083

spring:
  application:
    name: product-service
  datasource:
    url: jdbc:mysql://localhost:3306/product_db?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true
    username: commerce
    password: commerce1234
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    # data.sql이 JPA 테이블 생성 이후에 실행되도록 한다.
    # defer-datasource-initialization=true 없이는 data.sql이 테이블 생성 전에 실행되어 실패한다.
    defer-datasource-initialization: true
  sql:
    init:
      # embedded DB(H2)가 아닌 MySQL에서도 data.sql을 실행하려면 always로 설정해야 한다.
      # 기본값은 embedded 타입에서만 실행하는 'embedded'이다.
      mode: always
  data:
    redis:
      host: localhost
      port: 6379

resilience4j:
  circuitbreaker:
    instances:
      redisRanking:
        # slidingWindowSize: 최근 10번의 호출 결과를 기준으로 실패율을 계산한다.
        # 요청이 너무 적을 때 회로가 열리는 것을 방지하는 최소 샘플 크기이기도 하다.
        slidingWindowSize: 10
        # failureRateThreshold: 슬라이딩 윈도우 내 실패율이 50% 이상이면 회로를 OPEN 상태로 전환한다.
        # 즉 10번 중 5번 이상 실패하면 이후 요청은 Redis에 가지 않고 즉시 fallback을 반환한다.
        failureRateThreshold: 50
        # waitDurationInOpenState: 회로가 OPEN이 된 후 10초 동안은 모든 요청을 차단한다.
        # 10초 후 HALF_OPEN으로 전환하여 소수의 테스트 요청으로 Redis 복구 여부를 확인한다.
        waitDurationInOpenState: 10s
        # HALF_OPEN 상태에서 Redis 복구 여부를 판단할 때 허용하는 테스트 요청 수.
        permittedNumberOfCallsInHalfOpenState: 3

logging:
  level:
    com.commerce: DEBUG
